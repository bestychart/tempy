<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Npoint Basket Manager</title>
    <style>
        :root {
            --bg: #121212; --bg-card: #1e1e1e; --text: #e0e0e0;
            --primary: #bb86fc; --primary-hover: #9c64e8;
            --danger: #cf6679; --success: #03dac6;
            --border: #333; --input-bg: #2c2c2c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border); }
        h1, h2, h3 { margin-bottom: 15px; color: #fff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 1em; }
        button { padding: 10px 15px; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; transition: 0.2s; background: var(--primary); color: #000; font-weight: bold; }
        button:hover { background: var(--primary-hover); }
        button.danger { background: var(--danger); color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .flex-row { display: flex; gap: 15px; align-items: center; }
        .flex-row > * { flex: 1; }
        .checkbox-group { display: flex; gap: 15px; align-items: center; background: var(--input-bg); padding: 10px; border-radius: 4px; }
        .checkbox-group label { margin: 0; display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #252525; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; background: #333; }
        
        .loader { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none !important; }
        #notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 4px; background: var(--primary); color: #000; font-weight: bold; transform: translateX(150%); transition: transform 0.3s ease-out; z-index: 1000; }
        #notification.show { transform: translateX(0); }
        #notification.error { background: var(--danger); color: white; }

        .heartbeat-card { border: 1px solid var(--success); background: rgba(3, 218, 198, 0.05); }
    </style>
</head>
<body>

<div id="notification"></div>

<div class="container">
    <!-- Секція підключення -->
    <div id="authSection" class="card">
        <h2>Підключення API (npoint.io)</h2>
        <form id="authForm">
            <div class="form-group">
                <label for="npointCodeInput">Код npoint</label>
                <input type="password" id="npointCodeInput" placeholder="Напр. 96e51c8cb67681969093" autocomplete="off" inputmode="latin" spellcheck="false">
                <small id="endpointPreview" style="display: block; margin-top: 6px; color: #aaa; word-break: break-all;">Endpoint буде сформовано автоматично після введення коду.</small>
            </div>
            <div class="flex-row">
                <button type="submit" id="authBtn" style="flex: none;">Повторно підключитися</button>
                <button type="button" id="resetAuthBtn" class="danger hidden" style="flex: none;">Скинути налаштування</button>
                <div class="loader" id="authLoader"></div>
            </div>
        </form>
    </div>

    <!-- Основний інтерфейс (прихований до авторизації) -->
    <div id="mainSection" class="hidden">
        
        <!-- Керування HEARTBEAT -->
        <div class="card heartbeat-card">
            <h3>Системний токен: HEARTBEAT</h3>
            <div class="flex-row">
                <div>
                    <label>Статус</label>
                    <select id="hbStatus">
                        <option value="disabled">Вимкнено</option>
                        <option value="enabled">Увімкнено</option>
                    </select>
                </div>
                <div>
                    <label>Timeframe</label>
                    <select id="hbTimeframe">
                        <!-- Заповнюється через JS -->
                    </select>
                </div>
                <div style="display: flex; align-items: flex-end; padding-bottom: 2px;">
                    <button id="saveHbBtn" style="width: 100%;">Зберегти Heartbeat</button>
                </div>
            </div>
        </div>

        <!-- Додавання нового токена -->
        <div class="card">
            <h3>Додати новий токен</h3>
            <form id="addTokenForm" class="flex-row" style="flex-wrap: wrap;">
                <div class="form-group" style="flex: 1 1 20%;">
                    <label>Coin Symbol</label>
                    <input type="text" id="coinInput" placeholder="Напр. PRL" required>
                </div>
                <div class="form-group" style="flex: 1 1 20%;">
                    <label>Timeframe</label>
                    <select id="timeframeInput"></select>
                </div>
                <div class="form-group" style="flex: 1 1 20%;">
                    <label>Market</label>
                    <select id="marketInput">
                        <option value="spot">spot</option>
                        <option value="futures">futures</option>
                        <option value="alpha">alpha</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1 1 30%;">
                    <label>Indicator (BB, SM, V, HM)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="indBB"> BB</label>
                        <label><input type="checkbox" id="indSM" checked> SM</label>
                        <label><input type="checkbox" id="indV"> V</label>
                        <label><input type="checkbox" id="indHM"> HM</label>
                    </div>
                </div>
                <div class="form-group" style="flex: 1 1 100%; display: flex; justify-content: flex-end;">
                    <button type="submit">Додати токен</button>
                </div>
            </form>
        </div>

        <!-- Список токенів -->
        <div class="card">
            <div class="flex-row" style="justify-content: space-between; margin-bottom: 15px;">
                <h3 style="margin:0;">Поточні монети в управлінні</h3>
                <button id="refreshBtn" style="flex:none; background: #333; color: white;">Оновити дані</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="tokensTable">
                    <thead>
                        <tr>
                            <th>Coin</th>
                            <th>Timeframe</th>
                            <th>Market</th>
                            <th>Indicator</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Рендеринг через JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
