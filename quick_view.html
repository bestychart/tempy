            // === HISTORY SCROLL: Детекція скролу до країв серії ===
            _setupHistoryScroll() {
                // Зберігаємо попередній range.from для визначення напрямку скролу
                this._prevRangeFrom = null;

                this.chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
                    if (!range || this._suppressRangeEvents || !this.symbol) return;

                    const currentData = this.candleSeries.data();
                    if (!currentData || currentData.length === 0) return;

                    const totalBars = currentData.length;

                    // Визначаємо напрямок скролу
                    const prevFrom = this._prevRangeFrom;
                    this._prevRangeFrom = range.from;
                    const scrollingLeft = prevFrom !== null && range.from < prevFrom;

                    // === ТРИГЕР ЗЛІВА ===
                    // Спрацьовує коли:
                    // 1. Користувач скролить ВЛІВО (scrollingLeft)
                    // 2. range.from менше порогу devCloudLen*2+3 (не вистачає свічок для індикатора)
                    // 3. Є куди завантажувати (найстаріша свічка новіша за лістинг)
                    const devCloudLen = state.indicators.devCloud.emaLength || 132;
                    const leftThreshold = devCloudLen * 2 + 3;
                    let triggerLeft = false;
                    if (scrollingLeft && range.from < leftThreshold && totalBars > leftThreshold) {
                        if (this.coinData && this.coinData.listingDate > 0) {
                            const oldestCandleTimeMs = currentData[0].time * 1000;
                            triggerLeft = oldestCandleTimeMs > this.coinData.listingDate;
                        } else {
                            triggerLeft = true;
                        }
                    }

                    // === ТРИГЕР СПРАВА ===
                    // Спрацьовує ТІЛЬКИ в history mode, коли остання свічка серії видна на екрані
                    const triggerRight = this.historyScrollMode && range.to >= totalBars - 1;

                    if (!triggerLeft && !triggerRight) return;
                    if (this._historyLoadingInProgress) return;

                    // Debounce 300ms
                    if (this._historyDebounceTimer) clearTimeout(this._historyDebounceTimer);
                    this._historyDebounceTimer = setTimeout(() => {
                        this._historyDebounceTimer = null;
                        this._loadHistoryWindow(currentData, range);
                    }, 300);
                });
            }

            // === HISTORY SCROLL: Завантаження вікна історії ===
            _loadHistoryWindow(currentData, range) {
                if (this._historyLoadingInProgress || !this.symbol || !this.coinData) return;

                // Активуємо history mode якщо ще не активний
                if (!this.historyScrollMode) {
                    this.historyScrollMode = true;
                    worker.postMessage({ type: 'SET_HISTORY_MODE', payload: { chartId: this.id, enabled: true } });
                }

                this._historyLoadingInProgress = true;

                // Зберігаємо параметри viewport ДО завантаження
                // Кількість свічок на екрані (ширина viewport)
                const barsVisible = range.to - range.from;
                // Час середини видимого вікна
                const midLogical = Math.floor((range.from + range.to) / 2);
                const clampedMid = Math.max(0, Math.min(currentData.length - 1, midLogical));
                const midTime = currentData[clampedMid].time; // в секундах

                // Зберігаємо для відновлення після setData
                this._savedViewport = { midTime: midTime, barsVisible: barsVisible };

                // Рахуємо startTime/endTime в мілісекундах
                const tfSec = getTfSeconds(this.tf);
                const startTimeMs = (midTime - 650 * tfSec) * 1000;
                const endTimeMs = (midTime + 350 * tfSec) * 1000;

                worker.postMessage({
                    type: 'LOAD_HISTORY_WINDOW',
                    payload: {
                        chartId: this.id,
                        market: this.market,
                        symbol: this.symbol,
                        timeframe: this.tf,
                        startTime: Math.max(0, startTimeMs),
                        endTime: endTimeMs
                    }
                });
            }

            // === HISTORY SCROLL: Вихід з режиму історії і повернення до Live ===
            goToLive() {
                if (this.historyScrollMode) {
                    // Повний скид history mode
                    this.historyScrollMode = false;
                    this._historyLoadingInProgress = false;
                    this._savedViewport = null;
                    this._prevRangeFrom = null;
                    if (this._historyDebounceTimer) { 
                        clearTimeout(this._historyDebounceTimer); 
                        this._historyDebounceTimer = null; 
                    }
                    worker.postMessage({ type: 'SET_HISTORY_MODE', payload: { chartId: this.id, enabled: false } });
                    
                    // Suppress range events — знімається в updateData після setVisibleLogicalRange
                    // через прапорець _awaitingLiveData
                    this._suppressRangeEvents = true;
                    this._awaitingLiveData = true;
                    this.loadData();
                } else {
                    // Стандартний режим: скролимо до останньої свічки з коректним zoom
                    const currentData = this.candleSeries.data();
                    if (currentData.length > 0) {
                        const totalBars = currentData.length;
                        const barsOnScreen = Math.round((state.isPortrait ? 70 : 120) * state.zoom);
                        this.chart.timeScale().setVisibleLogicalRange({
                            from: totalBars - barsOnScreen,
                            to: totalBars + 2
                        });
                    }
                }
            }



            // Оновлений метод 
            setInverted(isInverted) {
                // 1. Застосовуємо опцію інверсії до бібліотеки
                this.chart.priceScale('right').applyOptions({
                    invertScale: isInverted
                });

                // 2. Жорстко інвалідуємо кеші примітивів.
                // Бо колір і кількість даних не змінились, кеш сам не зрозуміє, що масштаб перевернувся.
                if (this.primitive && typeof this.primitive.invalidateCaches === 'function') {
                    this.primitive.invalidateCaches();
                }
                if (this.cloudPrimitive && typeof this.cloudPrimitive.invalidateCaches === 'function') {
                    this.cloudPrimitive.invalidateCaches();
                }

                // 3. Відкладений рендеринг (Double rAF Pattern)
                // Бібліотеці Lightweight Charts потрібен 1 кадр (microtask/layout phase), 
                // щоб перерахувати внутрішні матриці (priceToCoordinate).
                // Якщо малювати одразу, Volume Profile та примітиви отримають старі Y-координати.
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        if (this.primitive) this.primitive.updateAll();
                        if (this.cloudPrimitive) this.cloudPrimitive.updateAll();
                        
                        if (state.indicators.vp.enabled) {
                            // Примусовий перерахунок після інверсії
                            this.executeRecalcVP(true);
                            
                            [150, 400, 800].forEach(delay => {
                                setTimeout(() => {
                                    if (this.vpOverlay) {
                                        this.vpOverlay._dirty = true;
                                        this.vpOverlay._scheduleRender();
                                    }
                                }, delay);
                            });
                        }
                    });
                });
            }
   


            saveState() {
                Storage.updateGroup(STORAGE_KEYS.CHARTS, data => {
                    if (!data.charts) data.charts = {};
                    data.charts[this.id] = {
                        market: this.market,
                        tf: this.tf,
                        savedSymbols: this.savedSymbols
                    };
                });
            }

            // --- НОВИЙ МЕТОД: Централізоване оновлення заголовків ---
            updateLegend() {
                if (!this.coinData) {
                    this.legend.textContent = 'Select Coin';
                    return;
                }

                // Текст для ЛЕГЕНДИ на графіку (зліва зверху на самому чарті)
                this.legend.textContent = `${this.coinData.dispName} ${this.tf}`;

                // Trigger-coin в хедері оновлюється через updateHeaderState()
                // щоб завжди відображати монету саме активного графіка
            }


            // 1. ОНОВЛЕНИЙ МЕТОД (додано preventLoad)
            setSymbol(coin, preventLoad = false) {
                this.symbol = coin.symbol;
                this.coinData = coin;
                
                this.savedSymbols[this.market] = coin.symbol;
                
                // Автоматичне скидання history mode при зміні монети
                if (this.historyScrollMode) {
                    this.historyScrollMode = false;
                    this._historyLoadingInProgress = false;
                    this._suppressRangeEvents = false;
                    this._prevRangeFrom = null;
                    this._savedViewport = null;
                    this._awaitingLiveData = false;
                    if (this._historyDebounceTimer) { clearTimeout(this._historyDebounceTimer); this._historyDebounceTimer = null; }
                    worker.postMessage({ type: 'SET_HISTORY_MODE', payload: { chartId: this.id, enabled: false } });
                }

                this.updateLegend();
                this.saveState();
                
                if (!preventLoad) this.loadData();
            }                      

            resize() {
                if (!this.wrapper || !this.chart) return;
                const width = this.wrapper.clientWidth;
                const height = this.wrapper.clientHeight;

                // === ФІКС 1: БЛОКУВАННЯ БЕЗКІНЕЧНОГО ЦИКЛУ RESIZE ===
                if (this._lastWidth === width && this._lastHeight === height) return;
                this._lastWidth = width;
                this._lastHeight = height;

                if (width > 0 && height > 0) {
                    this.chart.resize(width, height);
                    // Примітив оновиться сам, але про всяк випадок:
                    if (this.primitive) this.primitive.updateAll();
                    // VP overlay has its own canvas above the chart. Sync it explicitly after chart.resize(),
                    // but do not touch autoscale/layout here; user height changes must remain fully interactive.
                    if (this.vpOverlay && state.indicators.vp.enabled) {
                        if (typeof this.vpOverlay.forceResizeAndRender === 'function') {
                            this.vpOverlay.forceResizeAndRender();
                        } else {
                            this.vpOverlay._scheduleRender();
                        }
                        setTimeout(() => {
                            if (this.vpOverlay) this.vpOverlay._scheduleRender();
                        }, 100);
                    }

                }
            }

            updateData(data, precision, isUpdate = false, preventCenter = false) {
                // === FIX 1: Зберігаємо точність (Precision Memory) ===
                if (!isUpdate && precision > 0) {
                    this.savedPrecision = precision;
                }
                
                // Використовуємо збережену точність, якщо аргумент 0 або відсутній
                const activePrecision = this.savedPrecision || precision || 2;
                const minMove = 1 / Math.pow(10, activePrecision);

                const fmt = { type: 'price', precision: activePrecision, minMove: minMove };
                
                // Застосовуємо формат завжди, щоб гарантувати стабільність шкали
                this.candleSeries.applyOptions({ priceFormat: fmt });
                
                // Застосовуємо до всіх індикаторів
                [this.sma, this.bbUp, this.bbLo, this.bbMid, this.hma25, this.hma35, this.hma55, this.hma100].forEach(s => {
                    s.applyOptions({ priceFormat: fmt });
                });

                // Підготовка масивів даних
                const candles = [], vols = [], sma = [], bbU = [], bbL = [], bbM = [];
                const h25 = [], h35 = [], h55 = [], h80 = [], h100 = [];
                const dEma = [], dL1 = [], dH1 = [], dL2 = [], dH2 = [], dL4 = [], dH4 = [], dL5 = [], dH5 = [], dL6 = [], dH6 = [], dL8 = [], dH8 = [];

                const processVpCache = (d) => {
                    if (d.time === undefined || d.time === null || isNaN(d.time)) return;
                    if (isNaN(d.open) || isNaN(d.high) || isNaN(d.low) || isNaN(d.close) || isNaN(d.volume)) return;
                    this.vpDataCache.push({ time: d.time, open: d.open, high: d.high, low: d.low, close: d.close, volume: d.volume });
                };

                // Допоміжна функція парсингу (щоб не дублювати код)
                const parseItem = (d) => {
                    const t = d.time;
                    if (t === undefined || t === null || isNaN(t)) return;
                    
                    // Валідація свічки
                    if (d.open === undefined || d.open === null || isNaN(d.open) ||
                        d.high === undefined || d.high === null || isNaN(d.high) ||
                        d.low === undefined || d.low === null || isNaN(d.low) ||
                        d.close === undefined || d.close === null || isNaN(d.close)) {
                        return;
                    }

                    const volCfg = state.indicators.volume;
                    candles.push({ time: t, open: d.open, high: d.high, low: d.low, close: d.close });
                    
                    if (d.volume !== undefined && d.volume !== null && !isNaN(d.volume)) {
                        vols.push({ time: t, value: d.volume, color: d.close >= d.open ? volCfg.upColor.color : volCfg.downColor.color });
                    }
                    
                    if (d.sma7 !== undefined && d.sma7 !== null && !isNaN(d.sma7)) {
                        sma.push({time:t, value:d.sma7});
                    }
                    
                    if (d.bbUpper !== undefined && d.bbUpper !== null && !isNaN(d.bbUpper) &&
                        d.bbLower !== undefined && d.bbLower !== null && !isNaN(d.bbLower) &&
                        d.bbMiddle !== undefined && d.bbMiddle !== null && !isNaN(d.bbMiddle)) { 
                        bbU.push({time:t, value:d.bbUpper}); 
                        bbL.push({time:t, value:d.bbLower}); 
                        bbM.push({time:t, value:d.bbMiddle}); 
                    }
                    
                    if (d.hma25 !== undefined && d.hma25 !== null && !isNaN(d.hma25)) h25.push({time:t, value:d.hma25});
                    if (d.hma35 !== undefined && d.hma35 !== null && !isNaN(d.hma35)) h35.push({time:t, value:d.hma35});
                    if (d.hma55 !== undefined && d.hma55 !== null && !isNaN(d.hma55)) h55.push({time:t, value:d.hma55});
                    if (d.hma80 !== undefined && d.hma80 !== null && !isNaN(d.hma80)) h80.push({time:t, value:d.hma80});
                    if (d.hma100 !== undefined && d.hma100 !== null && !isNaN(d.hma100)) h100.push({time:t, value:d.hma100});
                    
                    if (d.devL1 !== undefined && d.devL1 !== null && !isNaN(d.devL1) &&
                        d.threeEma !== undefined && d.threeEma !== null && !isNaN(d.threeEma)) {
                        dEma.push({time:t, value:d.threeEma});
                        dL1.push({time:t, value:d.devL1}); dH1.push({time:t, value:d.devH1});
                        dL2.push({time:t, value:d.devL2}); dH2.push({time:t, value:d.devH2});
                        dL4.push({time:t, value:d.devL4}); dH4.push({time:t, value:d.devH4});
                        dL5.push({time:t, value:d.devL5}); dH5.push({time:t, value:d.devH5});
                        dL6.push({time:t, value:d.devL6}); dH6.push({time:t, value:d.devH6});
                        dL8.push({time:t, value:d.devL8}); dH8.push({time:t, value:d.devH8});
                    }
                };

                if (!isUpdate) {
                    // --- INITIAL LOAD ---
                    data.forEach(parseItem);
                    
                    this.vpDataCache = [];
                    data.forEach(processVpCache);                    

                    // === ДОДАНО: Обмеження історії до 1500 свічок ===
                    const maxCandles = 1500;
                    const trimArray = (arr) => { while(arr.length > maxCandles) arr.shift(); };
                    [candles, vols, sma, bbU, bbL, bbM, 
                    h25, h35, h55, h80, h100, dEma, dL1, dH1, dL2, dH2, dL4, dH4, dL5, dH5, 
                    dL6, dH6, dL8, dH8].forEach(trimArray);

                    // === Санітизація, Сортування та Дедуплікація даних перед передачею в бібліотеку ===
                    const prepareSeriesData = (arr) => {
                        const clean = arr.filter(item => 
                            item.time !== undefined && item.time !== null && !isNaN(item.time) &&
                            item.value !== undefined && item.value !== null && !isNaN(item.value)
                        );
                        clean.sort((a, b) => a.time - b.time);
                        const unique = [];
                        for (let i = 0; i < clean.length; i++) {
                            if (unique.length > 0 && unique[unique.length - 1].time === clean[i].time) {
                                unique[unique.length - 1] = clean[i];
                            } else {
                                unique.push(clean[i]);
                            }
                        }
                        return unique;
                    };

                    const prepareCandleData = (arr) => {
                        const clean = arr.filter(item => 
                            item.time !== undefined && item.time !== null && !isNaN(item.time) &&
                            item.open !== undefined && item.open !== null && !isNaN(item.open) &&
                            item.high !== undefined && item.high !== null && !isNaN(item.high) &&
                            item.low !== undefined && item.low !== null && !isNaN(item.low) &&
                            item.close !== undefined && item.close !== null && !isNaN(item.close)
                        );
                        clean.sort((a, b) => a.time - b.time);
                        const unique = [];
                        for (let i = 0; i < clean.length; i++) {
                            if (unique.length > 0 && unique[unique.length - 1].time === clean[i].time) {
                                unique[unique.length - 1] = clean[i];
                            } else {
                                unique.push(clean[i]);
                            }
                        }
                        return unique;
                    };

                    const cleanCandles = prepareCandleData(candles);

                    // Фільтр, який залишає лише ті точки, часові мітки яких є в масиві свічок.
                    // Це гарантує, що індекси індикаторів у TimeScale ніколи не вилізуть за межі.
                    const candleTimes = new Set(cleanCandles.map(c => c.time));
                    const filterByCandleTimes = (arr) => arr.filter(item => candleTimes.has(item.time));

                    const cleanVols = filterByCandleTimes(prepareSeriesData(vols));
                    const cleanSma = filterByCandleTimes(prepareSeriesData(sma));
                    const cleanBbU = filterByCandleTimes(prepareSeriesData(bbU));
                    const cleanBbL = filterByCandleTimes(prepareSeriesData(bbL));
                    const cleanBbM = filterByCandleTimes(prepareSeriesData(bbM));
                    const cleanH25 = filterByCandleTimes(prepareSeriesData(h25));
                    const cleanH35 = filterByCandleTimes(prepareSeriesData(h35));
                    const cleanH55 = filterByCandleTimes(prepareSeriesData(h55));
                    const cleanH80 = filterByCandleTimes(prepareSeriesData(h80));
                    const cleanH100 = filterByCandleTimes(prepareSeriesData(h100));
                    const cleanDEma = filterByCandleTimes(prepareSeriesData(dEma));
                    const cleanDL1 = filterByCandleTimes(prepareSeriesData(dL1));
                    const cleanDH1 = filterByCandleTimes(prepareSeriesData(dH1));
                    const cleanDL2 = filterByCandleTimes(prepareSeriesData(dL2));
                    const cleanDH2 = filterByCandleTimes(prepareSeriesData(dH2));
                    const cleanDL4 = filterByCandleTimes(prepareSeriesData(dL4));
                    const cleanDH4 = filterByCandleTimes(prepareSeriesData(dH4));
                    const cleanDL5 = filterByCandleTimes(prepareSeriesData(dL5));
                    const cleanDH5 = filterByCandleTimes(prepareSeriesData(dH5));
                    const cleanDL6 = filterByCandleTimes(prepareSeriesData(dL6));
                    const cleanDH6 = filterByCandleTimes(prepareSeriesData(dH6));
                    const cleanDL8 = filterByCandleTimes(prepareSeriesData(dL8));
                    const cleanDH8 = filterByCandleTimes(prepareSeriesData(dH8));

                    // === ВИПРАВЛЕННЯ: Скидання масштабу ціни ===
                    this.chart.priceScale('right').applyOptions({
                        autoScale: true, // Вмикаємо автомасштаб
                        scaleMargins: { top: 0.05, bottom: 0.05 } // Відновлюємо відступи
                    });

                    this.candleSeries.setData(cleanCandles);
                    this.volumeSeries.setData(cleanVols);
                    this.sma.setData(cleanSma);
                    this.bbUp.setData(cleanBbU); this.bbLo.setData(cleanBbL); this.bbMid.setData(cleanBbM);
                    this.hma25.setData(cleanH25); this.hma35.setData(cleanH35); this.hma55.setData(cleanH55); this.hma100.setData(cleanH100);
                    if (this.devSeries) {
                        this.devSeries.ema.setData(cleanDEma);
                        this.devSeries.L1.setData(cleanDL1); this.devSeries.H1.setData(cleanDH1);
                        this.devSeries.L2.setData(cleanDL2); this.devSeries.H2.setData(cleanDH2);
                        this.devSeries.L4.setData(cleanDL4); this.devSeries.H4.setData(cleanDH4);
                        this.devSeries.L5.setData(cleanDL5); this.devSeries.H5.setData(cleanDH5);
                        this.devSeries.L6.setData(cleanDL6); this.devSeries.H6.setData(cleanDH6);
                        this.devSeries.L8.setData(cleanDL8); this.devSeries.H8.setData(cleanDH8);
                    }

                    this.devCloudCache = { L1:cleanDL1, L2:cleanDL2, H1:cleanDH1, H2:cleanDH2, L4:cleanDL4, L8:cleanDL8, H4:cleanDH4, H8:cleanDH8 };
                    this.cloudPrimitive.update(this.devCloudCache);

                    this.hmaDataCache = { h35:cleanH35, h55:cleanH55, h80:cleanH80, h100:cleanH100 };
                    
                    // Центрування (Setting Range)
                    if (!preventCenter) {
                        const totalBars = cleanCandles.length;
                        const barsOnScreen = Math.round((state.isPortrait ? 70 : 120) * state.zoom);
                        this.chart.timeScale().setVisibleLogicalRange({
                            from: totalBars - barsOnScreen,
                            to: totalBars + 2
                        });
                    }

                    // --- ВИПРАВЛЕННЯ: ЗАТРИМКА ДЛЯ СИНХРОНІЗАЦІЇ МАСШТАБУ ---
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            this.refreshPrimitive();
                            this.executeRecalcVP(true);

                            // Знімаємо suppress після повної стабілізації (для goToLive)
                            if (this._awaitingLiveData) {
                                this._awaitingLiveData = false;
                                this._suppressRangeEvents = false;
                                this._prevRangeFrom = null;
                            }

                            [150, 400, 800, 1500].forEach(delay => {
                                setTimeout(() => {
                                    if (this.vpOverlay && state.indicators.vp.enabled) {
                                        this.vpOverlay._dirty = true;
                                        this.vpOverlay._scheduleRender();
                                    }
                                }, delay);
                            });
                        });
                    });

                } else {
                    // --- REALTIME UPDATE ---
                    let candleClosed = false;
                    const currentData = this.candleSeries.data();
                    const lastBar = currentData.length > 0 ? currentData[currentData.length - 1] : null;
                    const lastTime = lastBar ? lastBar.time : 0;

                    const validUpdates = data.filter(d => d.time >= lastTime);
                    if (validUpdates.length === 0) return;

                    validUpdates.forEach(d => {
                        const t = d.time;
                        if (t === undefined || t === null || isNaN(t)) return;

                        if (d.open === undefined || d.open === null || isNaN(d.open) ||
                            d.high === undefined || d.high === null || isNaN(d.high) ||
                            d.low === undefined || d.low === null || isNaN(d.low) ||
                            d.close === undefined || d.close === null || isNaN(d.close)) {
                            return;
                        }

                        this.candleSeries.update({ time: t, open: d.open, high: d.high, low: d.low, close: d.close });
                        this.volumeSeries.update({ time: t, value: d.volume, color: d.close >= d.open ? state.indicators.volume.upColor.color : state.indicators.volume.downColor.color });
                        
                        if(d.sma7) this.sma.update({time:t, value:d.sma7});
                        if(d.bbUpper) { 
                            this.bbUp.update({time:t, value:d.bbUpper}); 
                            this.bbLo.update({time:t, value:d.bbLower}); 
                            this.bbMid.update({time:t, value:d.bbMiddle}); 
                        }
                        if(d.hma25) this.hma25.update({time:t, value:d.hma25});
                        if(d.hma35) this.hma35.update({time:t, value:d.hma35});
                        if(d.hma55) this.hma55.update({time:t, value:d.hma55});
                        if(d.hma100) this.hma100.update({time:t, value:d.hma100});

                        // === НОВЕ: ОНОВЛЕННЯ ЛІНІЙ DEVIATION CLOUD ===
                        if (d.devL1 !== undefined && this.devSeries) {
                            this.devSeries.ema.update({ time: t, value: d.threeEma });
                            this.devSeries.L1.update({ time: t, value: d.devL1 });
                            this.devSeries.H1.update({ time: t, value: d.devH1 });
                            this.devSeries.L2.update({ time: t, value: d.devL2 });
                            this.devSeries.H2.update({ time: t, value: d.devH2 });
                            this.devSeries.L4.update({ time: t, value: d.devL4 });
                            this.devSeries.H4.update({ time: t, value: d.devH4 });
                            this.devSeries.L5.update({ time: t, value: d.devL5 });
                            this.devSeries.H5.update({ time: t, value: d.devH5 });
                            this.devSeries.L6.update({ time: t, value: d.devL6 });
                            this.devSeries.H6.update({ time: t, value: d.devH6 });
                            this.devSeries.L8.update({ time: t, value: d.devL8 });
                            this.devSeries.H8.update({ time: t, value: d.devH8 });
                        }


                        // Оновлюємо кеш для примітиву (заливки)
                        const updateCacheArr = (arr, val) => {
                            // НАДІЙНІСТЬ: Перевіряємо чи існує значення І чи існує сам масив (arr)
                            if (val === undefined || val === null || !arr) return;
                            
                            if (arr.length && arr[arr.length - 1].time === t) {
                                // Оновлюємо поточну свічку
                                arr[arr.length - 1] = { time: t, value: val };
                            } else {
                                // Додаємо нову свічку
                                arr.push({ time: t, value: val });
                                if (arr.length > 1500) {
                                    arr.shift();
                                }
                            }
                        };
                        
                        updateCacheArr(this.hmaDataCache.h35, d.hma35);
                        updateCacheArr(this.hmaDataCache.h55, d.hma55);
                        updateCacheArr(this.hmaDataCache.h80, d.hma80);
                        updateCacheArr(this.hmaDataCache.h100, d.hma100);
                                                // === НОВЕ: ОНОВЛЕННЯ КЕШУ ДЛЯ ЗАЛИВКИ DEVIATION CLOUD ===
                        if (d.devL1 !== undefined && this.devCloudCache) {
                            updateCacheArr(this.devCloudCache.L1, d.devL1);
                            updateCacheArr(this.devCloudCache.L2, d.devL2);
                            updateCacheArr(this.devCloudCache.H1, d.devH1);
                            updateCacheArr(this.devCloudCache.H2, d.devH2);
                            updateCacheArr(this.devCloudCache.L4, d.devL4);
                            updateCacheArr(this.devCloudCache.L8, d.devL8);
                            updateCacheArr(this.devCloudCache.H4, d.devH4);
                            updateCacheArr(this.devCloudCache.H8, d.devH8);
                        }
                        // Оновлення кешу VP (Мутація замість створення нових об'єктів - Zero GC)
                        const lastVp = this.vpDataCache[this.vpDataCache.length - 1];
                        
                        if (lastVp && lastVp.time === t) {
                            // Якщо це поточна свічка - просто оновлюємо значення
                            lastVp.high = Math.max(lastVp.high, d.high);
                            lastVp.low = Math.min(lastVp.low, d.low);
                            
                            lastVp.close = d.close;
                            lastVp.volume = d.volume; 
                        } else if (lastVp && t > lastVp.time) {
                            // Зафіксовано відкриття нової свічки
                            this.vpDataCache.push({ time: t, open: d.open, high: d.high, low: d.low, close: d.close, volume: d.volume });
                            if (this.vpDataCache.length > 2000) this.vpDataCache.shift(); 
                            candleClosed = true; // Тригер для перерахунку профілю
                        } else if (!lastVp) {
                            // Фолбек, якщо масив був порожній
                            
                            this.vpDataCache.push({ time: t, open: d.open, high: d.high, low: d.low, close: d.close, volume: d.volume });
                        }
                    });
                    
                    // Виклик Debounced перерахунку, якщо свічка закрилась
                    if (candleClosed) {
                        
                        this.executeRecalcVP(false);
                    }

                    
                    
                    // === ФІКС 2: ЗАХИСТ ВІД СПАМУ РЕНДЕРИНГУ ===
                    if (!this._realtimeRafTimer) {
                        this._realtimeRafTimer = requestAnimationFrame(() => {
                            this._realtimeRafTimer = null; // Очищаємо перед виконанням
                            this.refreshPrimitive(); 
                            if (this.cloudPrimitive) {
                                this.cloudPrimitive.update(this.devCloudCache); 
                            }
                        });
                    }
                }
            }

            handleVolumeProfileHealthcheck(reason, details = {}) {
                if (!state?.indicators?.vp?.enabled || !this.vpOverlay) return;
                if (this._vpHealthcheckRecoveryRaf) return;

                this._vpHealthcheckRecoveryRaf = requestAnimationFrame(() => {
                    this._vpHealthcheckRecoveryRaf = null;

                    // Passive VP-only recovery. Health-check must never mutate chart layout,
                    // main-container height, autoscale, visible range, zoom/scale, or localStorage.
                    // Otherwise manual height changes can be immediately overwritten or locked.
                    if (typeof this.vpOverlay.forceResizeAndRender === 'function') {
                        this.vpOverlay.forceResizeAndRender();
                    } else {
                        this.vpOverlay._scheduleRender();
                    }

                    this.executeRecalcVP(true);

                    // Give Lightweight Charts a couple of frames to settle priceToCoordinate after
                    // normal chart resize, then repaint VP only. No layout recovery is performed here.
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            if (this.vpOverlay && state.indicators.vp.enabled) {
                                this.vpOverlay._scheduleRender();
                            }
                        });
                    });

                    [150, 400].forEach(delay => {
                        setTimeout(() => {
                            if (this.vpOverlay && state.indicators.vp.enabled) {
                                this.vpOverlay._scheduleRender();
                            }
                        }, delay);
                    });
                });
            }

            // --- VOLUME PROFILE DEBOUNCED CALCULATION ---
            executeRecalcVP(immediate = false) {
                const conf = state?.indicators?.vp;
                
                // 1. АБСОЛЮТНИЙ ЗАХИСТ
                if (!conf || !conf.enabled) {
                    if (this.vpOverlay._data && this.vpOverlay._data.length > 0) {
                        this.vpOverlay.clear();
                        
                    }
                    if (this.vpRecalcTimer) {
                        cancelAnimationFrame(this.vpRecalcTimer);
                        this.vpRecalcTimer = null;
                    }
                    return; 
                }

                if (this.vpDataCache.length === 0) return;
                
                const calcLogic = () => {
                    const currentConf = state?.indicators?.vp;
                    if (!currentConf || !currentConf.enabled) return;

                    let dataToCalc = this.vpDataCache;
                    if (dataToCalc.length > currentConf.historyMax) {
                        dataToCalc = dataToCalc.slice(dataToCalc.length - currentConf.historyMax);
                    }
                    
                    if (dataToCalc.length > 1) {
                        dataToCalc = dataToCalc.slice(0, -1);
                    }

                    this.vpCalculator.setKlines(dataToCalc);
                    const result = this.vpCalculator.createHistogram(currentConf.ticks, currentConf.mode);

                    let threshold = Infinity;
                    if (result.stats.nonZero.length > 0) {
                        const mean = result.stats.nonZero.reduce((a, b) => a + b, 0) / result.stats.nonZero.length;
                        const variance = result.stats.nonZero.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / result.stats.nonZero.length;
                        threshold = mean + (Math.sqrt(variance) * currentConf.sensitivity);
                    }

                    this.vpOverlay.setData(result.data, {
                        sensitivity: currentConf.sensitivity,
                        widthPct: currentConf.widthPct,
                        showGrid: currentConf.showGrid,
                        colors: { high: currentConf.high.color, base: currentConf.base.color },
                        maxVol: result.stats.maxVol,
                        threshold: threshold
                    });
                    
                    this.vpRecalcTimer = null; // Звільняємо таймер
                };

                // === ВИПРАВЛЕННЯ: Використовуємо requestAnimationFrame замість setTimeout ===
                if (immediate) {
                    if (this.vpRecalcTimer) { cancelAnimationFrame(this.vpRecalcTimer); this.vpRecalcTimer = null; }
                    calcLogic();
                } else {
                    if (!this.vpRecalcTimer) {
                        // Рахуємо лише ОДИН РАЗ на кадр, навіть якщо прилетіло 10 тіків поспіль
                        this.vpRecalcTimer = requestAnimationFrame(calcLogic);
                    }
                }
            }


            // 3. НОВИЙ МЕТОД: Локальне перемальовування ЗУМу без запитів до мережі
            applyZoomLocal() {
                const currentData = this.candleSeries.data();
                const totalBars = currentData.length;
                if (totalBars === 0) return; // Немає даних - нічого не робимо

                const barsOnScreen = Math.round((state.isPortrait ? 70 : 120) * state.zoom);
                
                // Зсуваємо видиму зону графіка локально
                this.chart.timeScale().setVisibleLogicalRange({
                    from: totalBars - barsOnScreen,
                    to: totalBars + 2
                });
                
                // Примусово оновлюємо заливку HMA
                requestAnimationFrame(() => this.refreshPrimitive());
            }


            // 2. ОНОВЛЕНИЙ МЕТОД (додано preventLoad)
            updateConfig(newParams, preventLoad = false) {
                let changed = false;

                // Скидаємо history mode при будь-якій зміні конфігу
                if (this.historyScrollMode) {
                    this.historyScrollMode = false;
                    this._historyLoadingInProgress = false;
                    this._suppressRangeEvents = false;
                    this._prevRangeFrom = null;
                    this._savedViewport = null;
                    this._awaitingLiveData = false;
                    if (this._historyDebounceTimer) { clearTimeout(this._historyDebounceTimer); this._historyDebounceTimer = null; }
                    worker.postMessage({ type: 'SET_HISTORY_MODE', payload: { chartId: this.id, enabled: false } });
                }
                
                if (newParams.market && newParams.market !== this.market) {
                    this.market = newParams.market;
                    changed = true;
                    
                    const restoredSymbol = this.savedSymbols[this.market] || '';
                    this.symbol = restoredSymbol;
                    
                    if (this.symbol) {
                        let dispName = this.symbol;
                        if (state.coins[this.market]) {
                            const c = state.coins[this.market].find(x => x.symbol === this.symbol);
                            if (c) { dispName = c.dispName; this.coinData = c; }
                        }
                        this.legend.textContent = dispName;
                    } else {
                        this.legend.textContent = 'Select Coin';
                        this.coinData = null;
                        this.candleSeries.setData([]);
                        this.volumeSeries.setData([]);
                        this.hmaDataCache = {};
                        this.refreshPrimitive();
                    }
                    // Оновлюємо хедер якщо це активний графік
                    if (this.id === activeChartId) updateHeaderState();
                }

                if (newParams.tf && newParams.tf !== this.tf) {
                    this.tf = newParams.tf;
                    changed = true;
                    this.updateLegend(); 
                }

                if (changed) {
                    this.saveState();
                    // Викликаємо мережу, тільки якщо не заборонено
                    if (this.symbol && !preventLoad) this.loadData();
                }
            }

            updateIndicatorStyles() {
                const i = state.indicators;

                // Candle Theme
                const theme = CANDLE_THEMES[state.candleTheme] || CANDLE_THEMES.classic;
                if (this.candleSeries) {
                    this.candleSeries.applyOptions({
                        upColor: theme.upColor, downColor: theme.downColor,
                        wickUpColor: theme.wickUpColor, wickDownColor: theme.wickDownColor
                    });
                }

                // Volume Bars visibility
                if (this.volumeSeries) {
                    this.volumeSeries.applyOptions({ visible: i.volume.enabled });
                }

                // Класичні індикатори
                if(this.sma) this.sma.applyOptions({ visible: i.sma.enabled, color: i.sma.line.color, lineWidth: i.sma.line.width });
                if(this.bbUp) this.bbUp.applyOptions({ visible: i.bb.enabled, color: i.bb.upper.color, lineWidth: i.bb.upper.width });
                if(this.bbLo) this.bbLo.applyOptions({ visible: i.bb.enabled, color: i.bb.lower.color, lineWidth: i.bb.lower.width });
                if(this.bbMid) this.bbMid.applyOptions({ visible: i.bb.enabled, color: i.bb.middle.color, lineWidth: i.bb.middle.width }); 

                // HMA
                if(this.hma25) this.hma25.applyOptions({ visible: i.hma25.enabled, color: i.hma25.line.color, lineWidth: i.hma25.line.width });
                if(this.hma35) this.hma35.applyOptions({ visible: i.hma35.enabled, color: i.hma35.line.color, lineWidth: i.hma35.line.width });
                if(this.hma55) this.hma55.applyOptions({ visible: i.hma55.enabled, color: i.hma55.line.color, lineWidth: i.hma55.line.width });
                if(this.hma100) this.hma100.applyOptions({ visible: i.hma100.enabled, color: i.hma100.line.color, lineWidth: i.hma100.line.width });

                // DevCloud Лінії
                const d = i.devCloud;
                if(this.devSeries) {
                    Object.values(this.devSeries).forEach(series => {
                        series.applyOptions({ visible: d.enabled, color: d.lines.color, lineWidth: d.lines.width });
                    });
                }

                // DevCloud Заливка
                if (this.cloudPrimitive) {
                    this.cloudPrimitive.setColors(d.fill.color);
                    if (d.enabled) this.cloudPrimitive.updateAll();
                    else this.cloudPrimitive.clear();
                }
                // Оновлюємо Volume Profile при зміні стилів
                if (state.indicators.vp.enabled) {
                    this.vpOverlay.enable();
                    this.executeRecalcVP(true);
                } else {
                    this.vpOverlay.disable();
                }
            }

            refreshPrimitive() {
                // НАДІЙНІСТЬ: Перехоплюємо будь-який NaN, який міг прилетіти зі стейту
                let op = parseFloat(state.opacity);
                if (isNaN(op)) op = 0.35; 

                const ind = state.indicators;

                // FIX: Прив'язуємо відображення стрічок до стану індикаторів.
                // Якщо лінія вимкнена - заливка стає прозорою (невидимою).
                const c1 = ind.hma35.enabled ? `rgba(255, 183, 77, ${op})` : 'transparent';
                const c2 = ind.hma55.enabled ? `rgba(255, 183, 77, ${op})` : 'transparent';
                const c3 = ind.hma100.enabled ? `rgba(128, 222, 234, ${op})` : 'transparent';

                this.primitive.update(this.hmaDataCache, { c1, c2, c3 });
                
                // Безпечне оновлення Deviation Cloud
                if (this.cloudPrimitive && ind && ind.devCloud && ind.devCloud.enabled) {
                    this.cloudPrimitive.updateAll();
                }
            }

            loadData() {
                if (!this.symbol) return;
                
                // 1. Очищаємо всі дані серій для запобігання багів накладання таймфреймів/токенів
                this.candleSeries.setData([]);
                this.volumeSeries.setData([]);
                this.sma.setData([]);
                this.bbUp.setData([]); this.bbLo.setData([]); this.bbMid.setData([]);
                this.hma25.setData([]); this.hma35.setData([]); this.hma55.setData([]); this.hma100.setData([]);
                if (this.devSeries) {
                    Object.values(this.devSeries).forEach(s => s.setData([]));
                }
                
                // 2. Очищаємо кастомні примітиви та оверлеї
                if (this.primitive) this.primitive.clear();
                if (this.cloudPrimitive) this.cloudPrimitive.clear();
                if (this.vpOverlay) this.vpOverlay.clear();
                
                this.hmaDataCache = {};
                this.vpDataCache = [];

                // 3. Відправляємо запит
                worker.postMessage({ 
                    type: 'LOAD_CHART', 
                    payload: { 
                        chartId: this.id, 
                        market: this.market, 
                        symbol: this.symbol, 
                        timeframe: this.tf 
                    } 
                });
            }



            // Підписка на рух миші (використовується глобальним менеджером)
            subscribeCrosshairMove(handler) {
                this.chart.subscribeCrosshairMove(handler);
            }

            // Програмно показати перехрестя (вертикальну лінію)
            // price - необов'язковий, але потрібен API. Ми передамо 0 або close
            showSyncedCrosshair(time, price) {
                // Перевірка, чи є дані, щоб не викликати помилок
                if (this.candleSeries.data().length === 0) return;
                
                // Встановлюємо позицію. 
                // Використовуємо candleSeries як прив'язку.
                this.chart.setCrosshairPosition(price || 0, time, this.candleSeries);
            }

            // Прибрати перехрестя
            hideSyncedCrosshair() {
                this.chart.clearCrosshairPosition();
            }


        }

        // Змінна для таймера затримки (Debounce)
        let syncCrosshairTimer = null;

        function setupCrosshairSync() {
            const handleMove = (sourceId, param) => {
                if (activeChartId !== sourceId) return;

                const targetIds = getOtherChartIds(sourceId);
                const sourceChart = charts[sourceId];

                if (syncCrosshairTimer) {
                    clearTimeout(syncCrosshairTimer);
                    syncCrosshairTimer = null;
                }

                if (!param.time || param.point.x < 0 || param.point.y < 0) {
                    targetIds.forEach(tid => charts[tid].hideSyncedCrosshair());
                    return;
                }

                syncCrosshairTimer = setTimeout(() => {
                    if (activeChartId !== sourceId) return;

                    const sourceTime = param.time;

                    targetIds.forEach(tid => {
                        const targetChart = charts[tid];
                        const targetInterval = getTfSeconds(targetChart.tf);

                        let alignedTime = sourceTime;
                        if (targetInterval > 0) {
                             alignedTime = Math.floor(sourceTime / targetInterval) * targetInterval;
                        }

                        let price = 0;
                        if (sourceChart.symbol === targetChart.symbol) {
                             const sourceData = param.seriesData.get(sourceChart.candleSeries);
                             if (sourceData) price = sourceData.close || sourceData.value;
                        }

                        targetChart.showSyncedCrosshair(alignedTime, price);
                    });
                    
                }, 300);
            };

            CHART_IDS.forEach(id => {
                charts[id].subscribeCrosshairMove((p) => handleMove(id, p));
            });
        }

        function getTfSeconds(tf) {
            const val = parseInt(tf);
            if (tf.endsWith('m')) return val * 60;
            if (tf.endsWith('h')) return val * 60 * 60;
            if (tf.endsWith('d')) return val * 60 * 60 * 24;
            if (tf.endsWith('w')) return val * 60 * 60 * 24 * 7;
            return 0;
        }


        // --- GLOBAL STATE ---
        // 1. Виносимо дефолтні налаштування в константу для можливості скидання (Reset)
        const DEFAULT_INDICATORS_CONFIG = {
            volume: {
                enabled: true,
                upColor: { color: 'rgba(38, 166, 154, 0.2)' },
                downColor: { color: 'rgba(239, 83, 80, 0.2)' }
            },
            vp: {
                enabled: false, historyMax: 600, ticks: 150, mode: 'gaussian', sensitivity: 4.0, widthPct: 30,
                showGrid: false, 
                high: { color: 'rgba(251, 140, 0, 0.4)' },
                base: { color: 'rgba(150, 150, 150, 0.3)' }
            },
            devCloud: { 
                enabled: true, emaLength: 132, basisMode: 'ema',
                lines: { color: 'rgba(102, 153, 212, 0.4)', width: 1 }, 
                fill: { color: 'rgba(102, 153, 212, 0.1)' } 
            },
            hma25: { enabled: true, length: 25, line: { color: 'rgba(0, 100, 255, 0.3)', width: 1 } },
            hma35: { enabled: true, length: 35, line: { color: 'rgba(50, 205, 50, 0.8)', width: 1 } },
            hma55: { enabled: true, length: 55, line: { color: 'rgba(50, 205, 50, 0.8)', width: 1 } },
            hma100: { enabled: true, length: 100, line: { color: 'rgba(50, 205, 50, 0.8)', width: 1 } },
            sma: { enabled: true, length: 7, line: { color: 'rgba(245, 124, 0, 1)', width: 2 } },
            bb: { 
                enabled: true, length: 20, multiplier: 2, 
                upper: { color: 'rgba(123, 31, 162, 0.5)', width: 2 }, 
                middle: { color: 'rgba(255, 166, 0, 0.7)', width: 2 }, 
                lower: { color: 'rgba(123, 31, 162, 0.5)', width: 2 } 
            }
        };

        // НАДІЙНІСТЬ: Глибоке злиття кешу з новими налаштуваннями
        function deepMergeConfig(defaultObj, savedObj) {
            if (!savedObj || typeof savedObj !== 'object') return JSON.parse(JSON.stringify(defaultObj));
            const result = JSON.parse(JSON.stringify(defaultObj)); 
            for (const key in savedObj) {
                if (Object.prototype.hasOwnProperty.call(savedObj, key)) {
                    if (savedObj[key] && typeof savedObj[key] === 'object' && !Array.isArray(savedObj[key]) && result[key]) {
                        result[key] = deepMergeConfig(result[key], savedObj[key]);
                    } else {
                        result[key] = savedObj[key];
                    }
                }
            }
            return result;
        }


        // --- STARTUP STORAGE VALIDATION & SAFE DEFAULTS ---
        // Важливо: localStorage є недовіреним джерелом. Будь-яке NaN/Infinity/старе поле
        // може зламати viewport, autoscale або overlay VP. Тому нормалізуємо дані ДО state.
        const STORAGE_VALIDATION_LIMITS = {
            ui: {
                zoom: { min: 0.2, max: 5.0 },
                scale: { min: 35, max: 100 },
                opacity: { min: 0, max: 1 }
            },
            vp: {
                historyMax: { min: 100, max: 1500 },
                ticks: { min: 50, max: 500 },
                sensitivity: { min: 0.1, max: 5.0 },
                widthPct: { min: 10, max: 90 }
            },
            lineWidth: { min: 1, max: 4 },
            indicatorLength: { min: 1, max: 1000 }
        };

        function clonePlain(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function isFiniteNumber(value) {
            return typeof value === 'number' && Number.isFinite(value);
        }

        function toFiniteNumber(value, fallback) {
            const n = typeof value === 'number' ? value : parseFloat(value);
            return Number.isFinite(n) ? n : fallback;
        }

        function clampNumber(value, fallback, min, max, integer = false) {
            let n = toFiniteNumber(value, fallback);
            if (integer) n = Math.round(n);
            if (n < min) return min;
            if (n > max) return max;
            return n;
        }

        function sanitizeBoolean(value, fallback) {
            return typeof value === 'boolean' ? value : fallback;
        }

        function sanitizeEnum(value, allowedValues, fallback) {
            return allowedValues.includes(value) ? value : fallback;
        }

        function isValidCssColor(value) {
            return typeof value === 'string' && (
                /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(value.trim()) ||
                /^rgba?\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}(\s*,\s*(0|1|0?\.\d+))?\s*\)$/.test(value.trim())
            );
        }

        function sanitizeColorConfig(config, defaults, withWidth = false) {
            const out = clonePlain(defaults);
            if (config && typeof config === 'object') {
                out.color = isValidCssColor(config.color) ? config.color : defaults.color;
                if (withWidth || defaults.width !== undefined) {
                    out.width = clampNumber(
                        config.width,
                        defaults.width || 1,
                        STORAGE_VALIDATION_LIMITS.lineWidth.min,
                        STORAGE_VALIDATION_LIMITS.lineWidth.max,
                        true
                    );
                }
            }
            return out;
        }

        function sanitizeUiConfig(rawUi) {
            const ui = deepMergeConfig(DEFAULTS_UI, rawUi);
            return {
                schemaVersion: DEFAULTS_UI.schemaVersion,
                zoom: clampNumber(ui.zoom, DEFAULTS_UI.zoom, STORAGE_VALIDATION_LIMITS.ui.zoom.min, STORAGE_VALIDATION_LIMITS.ui.zoom.max),
                scale: clampNumber(ui.scale, DEFAULTS_UI.scale, STORAGE_VALIDATION_LIMITS.ui.scale.min, STORAGE_VALIDATION_LIMITS.ui.scale.max, true),
                opacity: clampNumber(ui.opacity, DEFAULTS_UI.opacity, STORAGE_VALIDATION_LIMITS.ui.opacity.min, STORAGE_VALIDATION_LIMITS.ui.opacity.max),
                inverted: sanitizeBoolean(ui.inverted, DEFAULTS_UI.inverted),
                showMobileControls: sanitizeBoolean(ui.showMobileControls, DEFAULTS_UI.showMobileControls),
                isSyncActive: sanitizeBoolean(ui.isSyncActive, DEFAULTS_UI.isSyncActive),
                candleTheme: sanitizeEnum(ui.candleTheme, Object.keys(CANDLE_THEMES), DEFAULTS_UI.candleTheme)
            };
        }

        function sanitizeIndicatorsConfig(rawIndicators) {
            const cfg = deepMergeConfig(DEFAULT_INDICATORS_CONFIG, rawIndicators);
            const def = DEFAULT_INDICATORS_CONFIG;

            cfg.volume.enabled = sanitizeBoolean(cfg.volume.enabled, def.volume.enabled);
            cfg.volume.upColor = sanitizeColorConfig(cfg.volume.upColor, def.volume.upColor);
            cfg.volume.downColor = sanitizeColorConfig(cfg.volume.downColor, def.volume.downColor);

            cfg.vp.enabled = sanitizeBoolean(cfg.vp.enabled, def.vp.enabled);
            cfg.vp.showGrid = sanitizeBoolean(cfg.vp.showGrid, def.vp.showGrid);
            cfg.vp.historyMax = clampNumber(cfg.vp.historyMax, def.vp.historyMax, STORAGE_VALIDATION_LIMITS.vp.historyMax.min, STORAGE_VALIDATION_LIMITS.vp.historyMax.max, true);
            cfg.vp.ticks = clampNumber(cfg.vp.ticks, def.vp.ticks, STORAGE_VALIDATION_LIMITS.vp.ticks.min, STORAGE_VALIDATION_LIMITS.vp.ticks.max, true);
            cfg.vp.mode = sanitizeEnum(cfg.vp.mode, ['gaussian', 'structural'], def.vp.mode);
            cfg.vp.sensitivity = clampNumber(cfg.vp.sensitivity, def.vp.sensitivity, STORAGE_VALIDATION_LIMITS.vp.sensitivity.min, STORAGE_VALIDATION_LIMITS.vp.sensitivity.max);
            cfg.vp.widthPct = clampNumber(cfg.vp.widthPct, def.vp.widthPct, STORAGE_VALIDATION_LIMITS.vp.widthPct.min, STORAGE_VALIDATION_LIMITS.vp.widthPct.max, true);
            cfg.vp.high = sanitizeColorConfig(cfg.vp.high, def.vp.high);
            cfg.vp.base = sanitizeColorConfig(cfg.vp.base, def.vp.base);

            cfg.devCloud.enabled = sanitizeBoolean(cfg.devCloud.enabled, def.devCloud.enabled);
            cfg.devCloud.emaLength = clampNumber(cfg.devCloud.emaLength, def.devCloud.emaLength, STORAGE_VALIDATION_LIMITS.indicatorLength.min, STORAGE_VALIDATION_LIMITS.indicatorLength.max, true);
            cfg.devCloud.basisMode = sanitizeEnum(cfg.devCloud.basisMode, ['ema', 'vwap'], def.devCloud.basisMode);
            cfg.devCloud.lines = sanitizeColorConfig(cfg.devCloud.lines, def.devCloud.lines, true);
            cfg.devCloud.fill = sanitizeColorConfig(cfg.devCloud.fill, def.devCloud.fill);

            ['hma25', 'hma35', 'hma55', 'hma100'].forEach(key => {
                cfg[key].enabled = sanitizeBoolean(cfg[key].enabled, def[key].enabled);
                cfg[key].length = clampNumber(cfg[key].length, def[key].length, STORAGE_VALIDATION_LIMITS.indicatorLength.min, STORAGE_VALIDATION_LIMITS.indicatorLength.max, true);
                cfg[key].line = sanitizeColorConfig(cfg[key].line, def[key].line, true);
            });

            cfg.sma.enabled = sanitizeBoolean(cfg.sma.enabled, def.sma.enabled);
            cfg.sma.length = clampNumber(cfg.sma.length, def.sma.length, STORAGE_VALIDATION_LIMITS.indicatorLength.min, STORAGE_VALIDATION_LIMITS.indicatorLength.max, true);
            cfg.sma.line = sanitizeColorConfig(cfg.sma.line, def.sma.line, true);

            cfg.bb.enabled = sanitizeBoolean(cfg.bb.enabled, def.bb.enabled);
            cfg.bb.length = clampNumber(cfg.bb.length, def.bb.length, STORAGE_VALIDATION_LIMITS.indicatorLength.min, STORAGE_VALIDATION_LIMITS.indicatorLength.max, true);
            cfg.bb.multiplier = clampNumber(cfg.bb.multiplier, def.bb.multiplier, 0.1, 20);
            cfg.bb.upper = sanitizeColorConfig(cfg.bb.upper, def.bb.upper, true);
            cfg.bb.middle = sanitizeColorConfig(cfg.bb.middle, def.bb.middle, true);
            cfg.bb.lower = sanitizeColorConfig(cfg.bb.lower, def.bb.lower, true);

            return cfg;
        }

        function persistIfSanitized(storageKey, before, after, writer) {
            try {
                if (JSON.stringify(before) !== JSON.stringify(after)) writer(after);
            } catch {
                writer(after);
            }
        }

        // Виконуємо міграцію зі старого формату (одноразово)
        migrateFromV1();

        // Завантажуємо збережені дані з групованого storage + санітизуємо недовірений localStorage
        const loadedUI = Storage.loadGroup(STORAGE_KEYS.UI, DEFAULTS_UI);
        const savedUI = sanitizeUiConfig(loadedUI);
        persistIfSanitized(STORAGE_KEYS.UI, loadedUI, savedUI, sanitized => Storage.saveGroup(STORAGE_KEYS.UI, sanitized));

        const savedChartsData = Storage.loadGroup(STORAGE_KEYS.CHARTS, DEFAULTS_CHARTS);

        const loadedIndicators = Storage.loadGroup(STORAGE_KEYS.INDICATORS, DEFAULT_INDICATORS_CONFIG);
        const savedIndicators = sanitizeIndicatorsConfig(loadedIndicators);
        persistIfSanitized(STORAGE_KEYS.INDICATORS, loadedIndicators, savedIndicators, sanitized => {
            Storage.saveGroup(STORAGE_KEYS.INDICATORS, { schemaVersion: 1, ...sanitized });
        });

        const state = {

        function toggleSync() {
            state.isSyncActive = !state.isSyncActive;
            Storage.updateGroup(STORAGE_KEYS.UI, data => { data.isSyncActive = state.isSyncActive; });
            
            // Візуалізація кнопки
            const btn = document.getElementById('sync-btn');

                btn.classList.add('active');

            } else {
                btn.classList.remove('active');
            }

        function syncToInactiveChart() {
            const sourceId = activeChartId;
            const source = charts[sourceId];

            if (!source.symbol || !source.coinData) return;

            const targetIds = getOtherChartIds(sourceId);

            targetIds.forEach((targetId, index) => {
                const target = charts[targetId];

                if (target.market !== source.market) {
                    target.updateConfig({ market: source.market }, true);
                }
                target.setSymbol(source.coinData, true);

                // Staggered delay: кожен наступний slave стартує з затримкою, 
                // щоб не перевантажити Worker паралельними запитами
                setTimeout(() => {
                    target.loadData();

                    const targetWrapper = document.getElementById(`wrapper-${targetId}`);
                    if (targetWrapper) {
                        targetWrapper.style.transition = 'box-shadow 0.2s';
                        targetWrapper.style.boxShadow = 'inset 0 0 0 4px var(--accent-color)';
                        setTimeout(() => {
                            targetWrapper.style.boxShadow = 'none';
                            targetWrapper.style.transition = ''; 
                        }, 200);
                    }
                }, index * 100);
            });
        }

        // --- ВИПРАВЛЕНА ФУНКЦІЯ ЗАСТОСУВАННЯ ---

        // === Динамічний CSS Grid Layout ===
        function updateGridLayout() {

        function updateHeaderState() {
            const activeCtrl = charts[activeChartId];
            if (!activeCtrl) return;

            const marketSel = document.getElementById('market-select');
            const tfSel = document.getElementById('tf-select');
            const triggerCoin = document.getElementById('trigger-coin');

            // Просто змінюємо значення. Це НЕ викликає onchange.
            // onchange викликається тільки при кліку мишкою користувачем.
            marketSel.value = activeCtrl.market;
            tfSel.value = activeCtrl.tf;

            // Оновлюємо текст кнопки вибору монети
            triggerCoin.textContent = activeCtrl.coinData ? activeCtrl.coinData.dispName : 'Select';
        }



        // === NAVIGATION CONTROLLER (Unified Logic) ===
        const Navigation = {
            // Зміна таймфрейму (-1 = вліво/менше, +1 = вправо/більше)
            moveTimeframe: (direction) => {
                const activeCtrl = charts[activeChartId];
                if (!activeCtrl) return;

                const tfSelect = document.getElementById('tf-select');
                const options = Array.from(tfSelect.options).map(o => o.value);
                const currentIdx = options.indexOf(activeCtrl.tf);

                if (currentIdx === -1) return;

                const newIdx = currentIdx + direction;
                // Перевірка меж
                if (newIdx < 0 || newIdx >= options.length) return;

                const newTf = options[newIdx];
                if (newTf !== activeCtrl.tf) {
                    activeCtrl.updateConfig({ tf: newTf });
                    tfSelect.value = newTf; // Синхронізація UI
                }
            },

            // Зміна монети (-1 = вгору/попередня, +1 = вниз/наступна)
            moveCoin: (direction) => {
                const activeCtrl = charts[activeChartId];
                if (!activeCtrl) return;

                const market = activeCtrl.market;
                const allCoins = state.coins[market] || [];
                const favorites = state.favorites[market] || [];

                // Формуємо візуальний список (точно як у меню)
                const visualList = [];
                
                // 1. Спочатку фаворити
                favorites.forEach(sym => {
                    const coin = allCoins.find(c => c.symbol === sym);
                    if (coin) visualList.push(coin);
                });

                // 2. Потім решта (виключаючи фаворитів)
                const restCoins = allCoins.filter(c => !favorites.includes(c.symbol));
                visualList.push(...restCoins);

                if (visualList.length === 0) return;

                // Знаходимо поточну
                const currentIdx = visualList.findIndex(c => c.symbol === activeCtrl.symbol);
                
                let newIdx;
                if (currentIdx === -1) {
                    newIdx = 0; // Якщо не знайдено, стаємо на початок
                } else {
                    newIdx = currentIdx + direction;
                }

                // Захист від виходу за межі (можна зробити циклічно, але тут жорсткі межі)
                if (newIdx < 0) newIdx = 0;
                if (newIdx >= visualList.length) newIdx = visualList.length - 1;

                if (newIdx !== currentIdx) {
                    const nextCoin = visualList[newIdx];
                    activeCtrl.setSymbol(nextCoin);
                    updateHeaderState();
                    if (state.isSyncActive) syncToInactiveChart();
                }
            }
        };

        // === TOUCH REPEAT ENGINE (Reliable Mobile Handler) ===
        // Дозволяє натискати один раз або затискати для швидкої прокрутки
        function setupTouchRepeater(btnId, actionCallback) {
            const btn = document.getElementById(btnId);
            if (!btn) return;

            let timeoutId = null;
            let intervalId = null;
            const INITIAL_DELAY = 400; // Затримка перед початком автоповтору (мс)
            const REPEAT_RATE = 100;   // Швидкість автоповтору (мс)

            const start = (e) => {
                if (e.cancelable) e.preventDefault(); // Блокуємо скрол/зум/мишу
                
                btn.classList.add('is-pressed'); // Візуальний ефект
                actionCallback(); // Виконуємо дію одразу (перший клік)

                // Запускаємо таймер для автоповтору
                timeoutId = setTimeout(() => {
                    intervalId = setInterval(actionCallback, REPEAT_RATE);
                }, INITIAL_DELAY);
            };

            const stop = (e) => {
                if (e.cancelable) e.preventDefault();
                
                btn.classList.remove('is-pressed');
                clearTimeout(timeoutId);
                clearInterval(intervalId);
                timeoutId = null;
                intervalId = null;
            };

            // Використовуємо passive: false, щоб працював e.preventDefault()
            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', stop);
            btn.addEventListener('touchcancel', stop);
            
            // Fallback для мишки (тестування на десктопі + гібридні пристрої)
            btn.addEventListener('mousedown', (e) => {
                if(e.button !== 0) return; // Тільки ліва кнопка
                start(e);
                const mouseUpHandler = () => {
                    stop(e);
                    document.removeEventListener('mouseup', mouseUpHandler);
                    document.removeEventListener('mouseleave', mouseUpHandler);
                };
                document.addEventListener('mouseup', mouseUpHandler);
                document.addEventListener('mouseleave', mouseUpHandler);
            });
        }



        function setupEvents() {
            // === ВИПРАВЛЕННЯ СЕЛЕКТОРА РИНКУ ===
            const marketSelect = document.getElementById('market-select');
            
            marketSelect.onchange = (e) => {
                // 1. Отримуємо нове значення
                const newVal = e.target.value;
                
                // 2. Оновлюємо ТІЛЬКИ активний графік
                const activeCtrl = charts[activeChartId];
                if (activeCtrl) {
                    activeCtrl.updateConfig({ market: newVal });
                    
                    // 3. Очищаємо список монет (візуально), щоб не було плутанини зі старим списком
                    // Новий список підтягнеться при відкритті дропдауна
                    renderList(''); 
                    // === ДОДАНО: Авто-синхронізація ===
                    if (state.isSyncActive) syncToInactiveChart();

                }

            // === ВИПРАВЛЕННЯ ТАЙМФРЕЙМУ ===
            document.getElementById('tf-select').onchange = (e) => {

            const toolbarToggle = document.getElementById('toolbar-toggle-btn');
            const toolbarMenu = document.getElementById('toolbar-popup-menu');

            toolbarToggle.onclick = (e) => {

                if (toolbarMenu.classList.contains('show')) {

                    setTimeout(() => toolbarMenu.style.display = 'none', 100);
                } else {
                    toolbarMenu.style.display = 'flex';
                    toolbarMenu.style.flexDirection = 'column';
                    toolbarMenu.style.alignItems = 'center';
                    requestAnimationFrame(() => toolbarMenu.classList.add('show'));
                }
            };

            // Кнопки всередині toolbar popup
            document.getElementById('sync-btn').onclick = (e) => {
                e.stopPropagation();
                toggleSync();
            };

            document.getElementById('invert-btn').onclick = (e) => {
                e.stopPropagation();
                toggleInversion();
            };

            document.getElementById('live-btn').onclick = (e) => {
                e.stopPropagation();
                const activeCtrl = charts[activeChartId];
                if (activeCtrl) activeCtrl.goToLive();

            document.getElementById('add-fav-btn').onclick = (e) => {
                e.stopPropagation();
                const activeCtrl = charts[activeChartId];
                if (!activeCtrl || !activeCtrl.symbol) return;
                
                const market = activeCtrl.market;
                const symbol = activeCtrl.symbol;

                // Перевіряємо чи ще немає в обраних
                if (!state.favorites[market].includes(symbol)) {
                    state.favorites[market].push(symbol); // Додаємо
                    
                    // Зберігаємо в LocalStorage
                    Storage.updateGroup(STORAGE_KEYS.CHARTS, data => {
                        data.favorites = state.favorites;
                    });
                    
                    // Одразу оновлюємо випадаючий список (якщо він відкритий) 
                    // або просто рендеримо його на фоні
                    const coinInp = document.getElementById('search-coin');
                    renderList(coinInp ? coinInp.value : '');
                }
                
                // Закриваємо тулбар після дії
                toolbarMenu.classList.remove('show');
                setTimeout(() => toolbarMenu.style.display = 'none', 100);
            };

            // --- НОВІ КНОПКИ: ВИДАЛИТИ З ОБРАНИХ ---
            document.getElementById('rem-fav-btn').onclick = (e) => {
                e.stopPropagation();
                const activeCtrl = charts[activeChartId];
                if (!activeCtrl || !activeCtrl.symbol) return;
                
                const market = activeCtrl.market;
                const symbol = activeCtrl.symbol;

                // Перевіряємо чи є в обраних
                if (state.favorites[market].includes(symbol)) {
                    // Видаляємо
                    state.favorites[market] = state.favorites[market].filter(s => s !== symbol);
                    
                    // Зберігаємо в LocalStorage
                    Storage.updateGroup(STORAGE_KEYS.CHARTS, data => {
                        data.favorites = state.favorites;
                    });
                    
                    // Оновлюємо список
                    const coinInp = document.getElementById('search-coin');
                    renderList(coinInp ? coinInp.value : '');
                }
                
                // Закриваємо тулбар після дії
                toolbarMenu.classList.remove('show');
                setTimeout(() => toolbarMenu.style.display = 'none', 100);
            };

            const settingsBtn = document.getElementById('settings-btn');
            if (settingsBtn) {
                settingsBtn.onclick = (e) => {
                    e.stopPropagation();
                    // Закриваємо toolbar popup перед відкриттям модального вікна
                    toolbarMenu.classList.remove('show');
                    setTimeout(() => toolbarMenu.style.display = 'none', 100);
                    SettingsManager.open();

            const leftSearch = document.getElementById('settings-search-left');
