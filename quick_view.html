            }

            const rightSearch = document.getElementById('settings-search-right');
            if (rightSearch) {
                rightSearch.oninput = (e) => {
                    SettingsManager.handleRightSearch(e.target.value);
                };
            }


            // 2. ОНОВЛЕНИЙ WAKE-UP: Логіка "4 свічок"
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    const nowSec = Math.floor(Date.now() / 1000);

                    CHART_IDS.forEach(id => {
                        const ctrl = charts[id];
                        if (!ctrl || !ctrl.symbol) return;

                        const currentData = ctrl.candleSeries.data();
                        
                        if (currentData.length === 0) {
                            ctrl.loadData();
                            return;
                        }

                        const lastCandleTime = currentData[currentData.length - 1].time;
                        const tfSec = getTfSeconds(ctrl.tf);
                        const diffSec = nowSec - lastCandleTime;

                        if (tfSec > 0 && diffSec > (4 * tfSec)) {
                            ctrl.loadData();
                        }
                    });
                }
            });

            // Дропдаун вибору монет (єдиний, для активного графіка)
            const coinTrg = document.getElementById('trigger-coin');
            const coinMenu = document.getElementById('menu-coin');
            const coinInp = document.getElementById('search-coin');
            
            coinTrg.onclick = (e) => {
                e.stopPropagation();
                // Закриваємо будь-які інші відкриті меню
                document.querySelectorAll('.custom-dropdown-menu').forEach(m => {
                    if (m !== coinMenu) { m.classList.remove('show'); m.style.display = 'none'; }
                });
                // Закриваємо toolbar popup
                const tbMenu = document.getElementById('toolbar-popup-menu');
                if (tbMenu) { tbMenu.classList.remove('show'); tbMenu.style.display = 'none'; }
                
                coinMenu.style.display = 'flex';
                coinInp.value = '';
                renderList(''); // Рендеримо список. Рендер додає клас "selected" активній монеті
                
                requestAnimationFrame(() => {
                    coinMenu.classList.add('show');
                    
                    // --- НОВЕ: ФОКУСУВАННЯ ТА СКРОЛ ---
                    // Шукаємо елемент li з класом 'selected'
                    const listEl = document.getElementById('list-coin');
                    const selectedItem = listEl.querySelector('.selected');
                    
                    if (selectedItem) {
                        // Скролимо так, щоб елемент був по центру списку
                        selectedItem.scrollIntoView({ behavior: 'auto', block: 'center' });
                    }
                });
                
                coinInp.focus();
            };
            
            coinInp.oninput = (e) => renderList(e.target.value);
            coinInp.onclick = (e) => e.stopPropagation();

            document.addEventListener('click', () => {
                // Закриваємо coin dropdown
                document.querySelectorAll('.custom-dropdown-menu').forEach(m => {
                    m.classList.remove('show');
                    setTimeout(()=>m.style.display='none', 100);
                });
                // Закриваємо toolbar popup
                const tbMenu = document.getElementById('toolbar-popup-menu');
                if (tbMenu && tbMenu.classList.contains('show')) {
                    tbMenu.classList.remove('show');
                    setTimeout(() => tbMenu.style.display = 'none', 100);
                }
            });

            // --- НОВА ЛОГІКА АВТО-РЕСАЙЗУ (ResizeObserver) ---
            // Це гарантує, що графік завжди заповнює 100% свого контейнера,
            // навіть якщо контейнер змінив розмір через поворот екрана чи CSS.
            const ro = new ResizeObserver((entries) => {
                requestAnimationFrame(() => {
                    entries.forEach(entry => {
                        // Витягуємо ID графіка з id елемента (wrapper-1 → 1)
                        const match = entry.target.id && entry.target.id.match(/^wrapper-(\d+)$/);
                        if (match) {
                            const chartId = parseInt(match[1]);
                            if (charts[chartId]) charts[chartId].resize();
                        }
                    });
                });
            });

            CHART_IDS.forEach(id => {
                const w = document.getElementById(`wrapper-${id}`);
                if (w) ro.observe(w);
            });

            // --- ДОДАТКОВА СТРАХОВКА ДЛЯ МОБІЛЬНИХ (Orientation Change) ---
            // Деякі мобільні браузери (iOS Safari) глючать при повороті,
            // тому примусово оновлюємо ще раз через 300мс після повороту.
            window.addEventListener('orientationchange', () => {
                state.isPortrait = window.innerHeight > window.innerWidth;
                updateGridLayout();
                setTimeout(() => {
                    CHART_IDS.forEach(id => charts[id].resize());
                }, 300);
            });
            
            window.addEventListener('resize', () => {
                 state.isPortrait = window.innerHeight > window.innerWidth;
                 updateGridLayout();
            });

            // Навігація клавіатурою
            // --- ДОДАТИ: Ініціалізація мобільних кнопок ---
            setupTouchRepeater('btn-up', () => Navigation.moveCoin(-1));
            setupTouchRepeater('btn-down', () => Navigation.moveCoin(1));
            setupTouchRepeater('btn-left', () => Navigation.moveTimeframe(-1));
            setupTouchRepeater('btn-right', () => Navigation.moveTimeframe(1));


            // --- ЗМІНЕНО: Блок Keydown (тепер використовує загальну логіку) ---
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                // Hotkeys (Alt+S, Alt+I...) залишаємо без змін
                if (e.altKey && (e.code === 'KeyS' || e.key === 's')) { 
                    e.preventDefault(); toggleSync(); return;
                }
                if (e.altKey && (e.code === 'KeyA' || e.key === 'a')) {
                    e.preventDefault(); toggleInversion(); return;
                }       

                // Timeframe Navigation
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    Navigation.moveTimeframe(-1);
                    return;
                }
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    Navigation.moveTimeframe(1);
                    return;
                }                

                // Coin Navigation
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    Navigation.moveCoin(-1);
                    return;
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    Navigation.moveCoin(1);
                    return;
                }
            });
        }

                const currentFavs = state.favorites[SettingsManager.activeMarket];

                    candleTheme: state.candleTheme,

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

                if (btnElement) {
                    btnElement.classList.add('active');

                    document.querySelector('.tab-btn').classList.add('active');

                    document.getElementById('tab-favorites').classList.add('active');

            save: () => {

                Storage.updateGroup(STORAGE_KEYS.CHARTS, data => {
                    data.favorites = state.favorites;
                });

                // 2. Переносимо налаштування з tempConfig у глобальний state
                const t = SettingsManager.tempConfig;
                const sanitizedUi = sanitizeUiConfig({
                    schemaVersion: 1,
                    zoom: t.zoom,
                    scale: t.scale,
                    opacity: t.opacity,
                    inverted: state.inverted,
                    showMobileControls: t.showMobileControls,
                    isSyncActive: state.isSyncActive,
                    candleTheme: t.candleTheme || 'classic'
                });
                const sanitizedIndicators = sanitizeIndicatorsConfig(t.indicators);

                state.zoom = sanitizedUi.zoom;
                state.scale = sanitizedUi.scale;
                state.opacity = sanitizedUi.opacity;
                state.showMobileControls = sanitizedUi.showMobileControls;
                state.candleTheme = sanitizedUi.candleTheme;
                state.indicators = sanitizedIndicators;

                // 3. Записуємо UI групу
                Storage.saveGroup(STORAGE_KEYS.UI, sanitizedUi);

                // 4. Записуємо indicators групу
                Storage.saveGroup(STORAGE_KEYS.INDICATORS, {
                    schemaVersion: 1,

                });

                document.getElementById('main-container').style.height = `calc(${state.scale}vh - 54px)`;

                        let value;
                        if (type === 'bool') value = e.target.checked;
                        else if (type === 'number') value = parseFloat(e.target.value);

                        const alphaPercent = opacityEl.value;
                        if (opacityValText) opacityValText.textContent = `${alphaPercent}%`;
                        
                        targetConfigObj.color = hexAndAlphaToRgba(hex, alphaPercent);
                    };

                    if (colorEl) colorEl.addEventListener('input', updateRgbaStr);
                    if (opacityEl) opacityEl.addEventListener('input', updateRgbaStr);
                    
                    if (widthEl) {
                        widthEl.addEventListener('input', (e) => {
                            const val = parseInt(e.target.value);
                            if (!isNaN(val)) targetConfigObj.width = val;
                        });
                    }

                    if (resetBtn && defaultConfigObj) {

                            e.preventDefault();

                            if (defaultConfigObj.width !== undefined) {
                                targetConfigObj.width = defaultConfigObj.width;
                            }

                            // 2. Оновлюємо візуальні елементи UI
                            if (colorEl) colorEl.value = rgbaToHex(defaultConfigObj.color);
                            if (opacityEl) {
                                const defaultAlpha = Math.round(getAlphaFromRgba(defaultConfigObj.color) * 100);
                                opacityEl.value = defaultAlpha;
                                if (opacityValText) opacityValText.textContent = `${defaultAlpha}%`;
                            }
                            if (widthEl && defaultConfigObj.width !== undefined) {
                                widthEl.value = defaultConfigObj.width;
                            }
                        });
                    }
                };

                const def = DEFAULT_INDICATORS_CONFIG; // Аліас для компактності

                    bindBasic('set_zoom', t, 'zoom', 'number');
                    bindBasic('set_scale', t, 'scale', 'number');
                    bindBasic('set_dpad', t, 'showMobileControls', 'bool');
                } 
                else if (key === 'volume') {
                    bindBasic('vol_enabled', t.indicators.volume, 'enabled', 'bool');
                    bindLineConfig('vol_up', t.indicators.volume.upColor, def.volume.upColor);
                    bindLineConfig('vol_down', t.indicators.volume.downColor, def.volume.downColor);
                }
                else if (key === 'vp') {
                    const resetUiBtn = document.getElementById('vp_reset_ui_only');
                    if (resetUiBtn) resetUiBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        SettingsManager.resetLayoutUiOnly();
                    });

                    bindBasic('vp_enabled', t.indicators.vp, 'enabled', 'bool');
                    bindBasic('vp_showGrid', t.indicators.vp, 'showGrid', 'bool');
                    bindBasic('vp_historyMax', t.indicators.vp, 'historyMax', 'number');
                    bindBasic('vp_ticks', t.indicators.vp, 'ticks', 'number');
                    bindBasic('vp_mode', t.indicators.vp, 'mode', 'string');
                    bindBasic('vp_sensitivity', t.indicators.vp, 'sensitivity', 'number');
                    bindBasic('vp_widthPct', t.indicators.vp, 'widthPct', 'number');
                    
                    bindLineConfig('vp_high', t.indicators.vp.high, def.vp.high);
                    bindLineConfig('vp_base', t.indicators.vp.base, def.vp.base);
                } 
                else if (key === 'devCloud') {
                    bindBasic('dc_enabled', t.indicators.devCloud, 'enabled', 'bool');
                    bindBasic('dc_basisMode', t.indicators.devCloud, 'basisMode', 'string');
                    bindBasic('dc_emaLength', t.indicators.devCloud, 'emaLength', 'number');
                    bindLineConfig('dc_lines', t.indicators.devCloud.lines, def.devCloud.lines);
                    bindLineConfig('dc_fill', t.indicators.devCloud.fill, def.devCloud.fill);
                } 
                else if (key === 'hma') {
                    bindBasic('set_hma_opacity', t, 'opacity', 'number');
                    ['25', '35', '55', '100'].forEach(len => {
                        bindBasic(`hma${len}_enabled`, t.indicators[`hma${len}`], 'enabled', 'bool');
                        bindBasic(`hma${len}_length`, t.indicators[`hma${len}`], 'length', 'number');
                        bindLineConfig(`hma${len}_line`, t.indicators[`hma${len}`].line, def[`hma${len}`].line);
                    });
                } 
                else if (key === 'classic') {
                    bindBasic('sma_enabled', t.indicators.sma, 'enabled', 'bool');
                    bindBasic('sma_length', t.indicators.sma, 'length', 'number');
                    bindLineConfig('sma_line', t.indicators.sma.line, def.sma.line);
                    
                    bindBasic('bb_enabled', t.indicators.bb, 'enabled', 'bool');
                    bindBasic('bb_length', t.indicators.bb, 'length', 'number');
                    bindBasic('bb_mult', t.indicators.bb, 'multiplier', 'number');
                    bindLineConfig('bb_upper', t.indicators.bb.upper, def.bb.upper);
                    bindLineConfig('bb_middle', t.indicators.bb.middle, def.bb.middle);
                    bindLineConfig('bb_lower', t.indicators.bb.lower, def.bb.lower);
                }
            },

            // === Методи Favorites (Без змін) ===
            moveToRight: () => {
                const selectedItems = document.querySelectorAll('#settings-list-left .settings-item.selected');
                selectedItems.forEach(item => {
                    const symbol = item.dataset.symbol;
                    if (!SettingsManager.tempFavorites.includes(symbol)) SettingsManager.tempFavorites.push(symbol);
                });
                SettingsManager.renderLists();
            },
            moveToLeft: () => {
                const selectedItems = document.querySelectorAll('#settings-list-right .settings-item.selected-for-action');
                const symbolsToRemove = Array.from(selectedItems).map(item => item.dataset.symbol);
                SettingsManager.tempFavorites = SettingsManager.tempFavorites.filter(s => !symbolsToRemove.includes(s));
                SettingsManager.renderLists();
            },
            renderLists: () => {
                const allCoins = state.coins[SettingsManager.activeMarket] ||[];
                const leftListEl = document.getElementById('settings-list-left');
                const rightListEl = document.getElementById('settings-list-right');
                if (!leftListEl || !rightListEl) return;

                leftListEl.innerHTML = ''; rightListEl.innerHTML = '';
                const leftFilter = document.getElementById('settings-search-left').value.toUpperCase();
                
                SettingsManager.tempFavorites.forEach((symbol, index) => {
                    const coin = allCoins.find(c => c.symbol === symbol);
                    const dispName = coin ? coin.dispName : symbol;
                    const li = document.createElement('li');
                    li.className = 'settings-item draggable';
                    li.draggable = true; li.dataset.index = index; li.dataset.symbol = symbol;
                    let badges = ''; if(coin) { if(coin.isNew) badges = '<span class="badge badge-new">NEW</span>'; else if(coin.isMid) badges = '<span class="badge badge-mid">MID</span>'; }
                    li.innerHTML = `<span>${dispName}${badges}</span> <span style="color:#ccc; cursor:grab">☰</span>`;
                    li.onclick = (e) => { e.stopPropagation(); li.classList.toggle('selected-for-action'); };
                    li.addEventListener('dragstart', (e) => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index); li.style.opacity = '0.5'; });
                    li.addEventListener('dragend', () => { li.style.opacity = '1'; document.querySelectorAll('.settings-item').forEach(i => i.classList.remove('drag-over')); });
                    li.addEventListener('dragover', (e) => { e.preventDefault(); li.classList.add('drag-over'); });
                    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
                    li.addEventListener('drop', (e) => SettingsManager.handleDrop(e, index));
                    rightListEl.appendChild(li);
                });

                allCoins.filter(c => !SettingsManager.tempFavorites.includes(c.symbol) && (!leftFilter || c.dispName.toUpperCase().startsWith(leftFilter))).forEach(c => {
                    const li = document.createElement('li');
                    li.className = 'settings-item'; li.dataset.symbol = c.symbol; 
                    let badges = ''; if(c.isNew) badges = '<span class="badge badge-new">NEW</span>'; else if(c.isMid) badges = '<span class="badge badge-mid">MID</span>';
                    li.innerHTML = `<span>${c.dispName}</span>${badges}`;
                    li.onclick = () => li.classList.toggle('selected');
                    leftListEl.appendChild(li);
                });
            },
            handleDrop: (e, targetIndex) => {
                e.preventDefault(); e.stopPropagation(); 
                const sourceIndex = parseInt(e.dataTransfer.getData('text/plain'));
                if (isNaN(sourceIndex) || sourceIndex === targetIndex) return;
                const item = SettingsManager.tempFavorites.splice(sourceIndex, 1)[0];
                SettingsManager.tempFavorites.splice(targetIndex, 0, item);
                SettingsManager.renderLists();
            },
            handleRightSearch: (text) => {
                const listItems = document.querySelectorAll('#settings-list-right .settings-item');
                listItems.forEach(el => el.classList.remove('highlight-focus'));
                if (!text) return;
                const upperText = text.toUpperCase(); let found = false;
                listItems.forEach(li => {
                    const coin = state.coins[SettingsManager.activeMarket].find(c => c.symbol === li.dataset.symbol);
                    const nameToCheck = coin ? coin.dispName.toUpperCase() : li.dataset.symbol.toUpperCase();
                    if (!found && nameToCheck.startsWith(upperText)) {
                        li.classList.add('highlight-focus'); li.scrollIntoView({ behavior: 'smooth', block: 'center' }); found = true;
                    }
                });
            }
        };   


        function renderList(filter) {
            const listEl = document.getElementById('list-coin');
            listEl.innerHTML = '';
            
            const ctrl = charts[activeChartId];
            if (!ctrl) return;
            const market = ctrl.market;
            const allCoins = state.coins[market] || [];
            const favorites = state.favorites[market] || [];

            if (allCoins.length === 0) {
                    listEl.innerHTML = '<div style="padding:10px;text-align:center;color:#999;font-size:12px">Loading...</div>';
                    return;
            }

            const f = filter.toUpperCase();

            // 1. РЕНДЕРИНГ FAVORITES (Вгорі, Custom Order)
            const activeFavs = favorites.map(sym => allCoins.find(c => c.symbol === sym))
                                        .filter(c => c !== undefined && c.dispName.toUpperCase().includes(f));

            if (activeFavs.length > 0) {
                activeFavs.forEach(c => createListItem(c, listEl, ctrl));
                
                const div = document.createElement('div');
                div.className = 'dropdown-divider'; 
                div.style.borderTop = '2px solid var(--accent-color)';
                div.style.marginTop = '0';
                listEl.appendChild(div);
            }

            // 2. РЕНДЕРИНГ ВСІХ ІНШИХ (Виключаючи фаворити)
            const restCoins = allCoins.filter(c => {
                if (favorites.includes(c.symbol)) return false;
                return c.dispName.toUpperCase().includes(f);
            });

            if (restCoins.length > 0) {
                restCoins.forEach(c => createListItem(c, listEl, ctrl));
            }

            if (activeFavs.length === 0 && restCoins.length === 0) {
                listEl.innerHTML = '<div style="padding:10px;text-align:center;color:#999;font-size:12px">No results</div>';
            }
        }

// Допоміжна функція для створення <li> (щоб не дублювати код)
        function createListItem(c, container, ctrl) {
            const li = document.createElement('li');
            let className = 'custom-option';
            
            if (c.isNew) className += ' is-new';
            if (c.isMid) className += ' is-mid';
            if (ctrl.symbol === c.symbol) className += ' selected';
            
            li.className = className;
            
            let badgeHtml = '';
            if (c.isNew) badgeHtml = `<span class="badge badge-new">NEW</span>`;
            else if (c.isMid) badgeHtml = `<span class="badge badge-mid">MID</span>`;

            li.innerHTML = `<span>${c.dispName}</span>${badgeHtml}`;
            
            li.onclick = (e) => {
                e.stopPropagation();

                const currentChartId = activeChartId;
                const currentCtrl = charts[currentChartId];

                // 1. Встановлюємо нову монету для активного графіка
                currentCtrl.setSymbol(c, false);

                // 2. Оновлюємо trigger-coin в хедері
                updateHeaderState();

                // 3. Синхронізація інших графіків (Slaves)
                if (state.isSyncActive) {
                    const targetIds = getOtherChartIds(currentChartId);

                    targetIds.forEach((targetId, index) => {
                        const targetCtrl = charts[targetId];

                        if (targetCtrl.market !== currentCtrl.market) {
                            targetCtrl.updateConfig({ market: currentCtrl.market }, true);
                        }
                        
                        targetCtrl.setSymbol(c, true);
                        
                        setTimeout(() => {
                            targetCtrl.loadData();
                            
                            const targetWrapper = document.getElementById(`wrapper-${targetId}`);
                            if (targetWrapper) {
                                targetWrapper.style.transition = 'box-shadow 0.2s';
                                targetWrapper.style.boxShadow = 'inset 0 0 0 4px var(--accent-color)';
                                setTimeout(() => {
                                    targetWrapper.style.boxShadow = 'none';
                                    targetWrapper.style.transition = ''; 
                                }, 200);
                            }
                        }, 50 + index * 100);
                    });
                }

                // 4. Закриваємо випадаюче меню
                const menu = document.getElementById('menu-coin');
                if (menu) {
                    menu.classList.remove('show');
                    setTimeout(() => menu.style.display = 'none', 100);
                }
            };
            
            container.appendChild(li);
        }


        worker.onmessage = (e) => {
            const { type, data, chartId, precision, market, symbol } = e.data; // Додано 'symbol' у деструктуризацію
            
            if (type === 'COINS_LISTS') {
                state.coins.ALPHA = (data.ALPHA ||[]).filter(coin => !coin.symbol.endsWith('on'));
                state.coins.FUTURES = data.FUTURES || [];
                state.coins.SPOT = data.SPOT || [];
                state.coins.BITSTAMP = data.BITSTAMP || [];
                
                CHART_IDS.forEach(id => {
                    if (charts[id] && charts[id].symbol && !charts[id].coinData) {
                        const c = state.coins[charts[id].market].find(x => x.symbol === charts[id].symbol);
                        if (c) charts[id].setSymbol(c);
                    }
                });
                // Оновлюємо trigger-coin після відновлення coinData
                updateHeaderState();
            }

            // Фільтрація застарілих даних (Fix "Ghost Tick")
            if ((type === 'CANDLES_DATA' || type === 'REALTIME_UPDATE' || type === 'HISTORY_WINDOW_DATA') && charts[chartId]) {
                if (charts[chartId].symbol !== symbol) {
                    return;
                }
            }

            if (type === 'CANDLES_DATA') {
                charts[chartId].updateData(data, precision, false);
            }
            if (type === 'REALTIME_UPDATE') {
                charts[chartId].updateData(data, 0, true);
            }
            if (type === 'HISTORY_WINDOW_DATA') {
                const ctrl = charts[chartId];
                if (ctrl && data && data.length > 0) {
                    // Suppress range events під час setData щоб уникнути нескінченного циклу
                    ctrl._suppressRangeEvents = true;

                    // Оновлюємо дані без автоматичного центрування
                    ctrl.updateData(data, precision, false, true);

                    // Відновлюємо viewport: центруємо на збережений midTime з тією ж кількістю свічок
                    // Робимо це СИНХРОННО, щоб шкала часу оновилася до першого рендерингу
                    if (ctrl._savedViewport) {
                        const sv = ctrl._savedViewport;
                        const candleData = ctrl.candleSeries.data();
                        if (candleData.length > 0) {
                            // Знаходимо індекс свічки найближчої до збереженого midTime
                            let midIdx = 0;
                            let minDiff = Infinity;
                            for (let i = 0; i < candleData.length; i++) {
                                const diff = Math.abs(candleData[i].time - sv.midTime);
                                if (diff < minDiff) { minDiff = diff; midIdx = i; }
                            }
                            // Ставимо viewport з тією ж шириною, центрований на midIdx
                            const halfBars = sv.barsVisible / 2;
                            const fromIdx = Math.max(0, midIdx - halfBars);
                            const toIdx = fromIdx + sv.barsVisible;
                            ctrl.chart.timeScale().setVisibleLogicalRange({ from: fromIdx, to: toIdx });
                        }
                        ctrl._savedViewport = null;
                    }

                    // Знімаємо suppress після синхронного оновлення
                    ctrl._suppressRangeEvents = false;
                }
                if (ctrl) ctrl._historyLoadingInProgress = false;
            }
            if (type === 'DATA_ERROR') {
                console.warn(`Chart ${chartId} error:`, e.data.reason);
                // Скидаємо прапорець при помилці
                if (charts[chartId]) charts[chartId]._historyLoadingInProgress = false;
            }
        };


        init();
    </script>
